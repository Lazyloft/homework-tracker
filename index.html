<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Homework Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --ink:#1f2a24;--paper:#faf7f0;--line:#d9d2c2;--accent:#c9622f;
  --pending:#8a8170;--pending-bg:#eee9dd;--done:#3d7a5c;--done-bg:#e3f0e8;
  --perfect:#3563a8;--perfect-bg:#e3eaf6;--missing:#b85c3a;--missing-bg:#fbe7df;
  --sub-color:#c94f7a;--sub-bg:#ffd6e4;
  --comp-color:#2a6e8a;--comp-bg:#cce8f4;
  --perf-color:#2e7d50;--perf-bg:#c8f0d8;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent;}
.app{max-width:100%;min-height:100vh;display:flex;flex-direction:column;padding-bottom:24px;}
header{padding:16px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:20;}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:4px;}
h1{font-size:20px;margin:0 0 10px;font-weight:800;}
.class-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
.class-chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:white;font-size:13px;font-weight:600;color:var(--pending);cursor:pointer;}
.class-chip.active{background:var(--accent);color:white;border-color:var(--accent);}
.add-class{display:flex;gap:6px;margin-top:8px;}
.add-class input{flex:1;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;}
.add-class button{background:var(--accent);color:white;font-weight:700;border-radius:8px;padding:7px 12px;font-size:13px;border:none;cursor:pointer;}
section{padding:14px 16px;}
.panel{background:white;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;}
.panel h2{margin:0 0 10px;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
.row-f{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
input[type=text],input[type=date],select{font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);}
button{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:8px;font-size:13px;padding:8px 12px;}
.btn-main{background:var(--accent);color:white;}
.btn-ghost{background:var(--pending-bg);color:var(--ink);}
.btn-active{background:var(--perfect);color:white;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.table-scroll{overflow-x:auto;border-radius:10px;border:1px solid var(--line);}
table{border-collapse:collapse;width:100%;font-size:12px;}
th,td{border:1px solid var(--line);padding:5px 7px;text-align:center;white-space:nowrap;}
th{background:#f1ede1;font-size:11px;}
th.hw-hd{background:#e3ddd0;font-size:12px;}
th.clickable{cursor:pointer;color:var(--accent);}
td:first-child{text-align:left;min-width:110px;}
td.st-submitted{background:var(--sub-bg);color:var(--sub-color);font-weight:700;}
td.st-perfect{background:var(--perf-bg);color:var(--perf-color);font-weight:700;}
td.st-completed{background:var(--comp-bg);color:var(--comp-color);font-weight:700;}
td.st-empty{background:white;}
.del-btn{background:none;color:var(--pending);font-size:13px;padding:1px 4px;border-radius:4px;border:none;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:12px;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:14px;padding:16px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{margin:0 0 8px;font-size:16px;}
.modal p{font-size:13px;color:var(--pending);margin:0 0 10px;}
.pill-grid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.pill{position:relative;border:2px solid var(--line);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;min-width:90px;text-align:center;}
.pill.pill-empty{background:white;color:var(--ink);border-color:var(--line);}
.pill.pill-submitted{background:var(--sub-bg);color:var(--sub-color);border-color:var(--sub-color);}
.pill.pill-perfect{background:var(--perf-bg);color:var(--perf-color);border-color:var(--perf-color);}
.pill.pill-completed{background:var(--comp-bg);color:var(--comp-color);border-color:var(--comp-color);}
.pill-dropdown{position:absolute;top:105%;left:0;background:white;border:1px solid var(--line);border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.15);z-index:60;overflow:hidden;min-width:180px;}
.pill-dropdown button{display:block;width:100%;text-align:left;background:white;color:var(--ink);border-radius:0;font-weight:600;font-size:13px;padding:9px 12px;border:none;cursor:pointer;}
.pill-dropdown button:hover{background:var(--pending-bg);}
footer{margin-top:auto;text-align:center;font-size:11px;color:var(--pending);padding:18px;}
.empty-state{text-align:center;color:var(--pending);font-size:13px;padding:30px 10px;}
.stu-pill{display:inline-block;padding:7px 14px;border-radius:999px;border:2px solid var(--line);background:white;font-size:13px;font-weight:600;cursor:pointer;margin:4px;}
.stu-pill.sel{background:#a8d5ba;border-color:#2e7d50;}
.hw-check{display:flex;align-items:center;gap:10px;padding:6px 8px;border-bottom:1px solid var(--line);cursor:pointer;}
.hw-check:hover{background:var(--pending-bg);}
.hw-check input[type=checkbox]{width:18px;height:18px;cursor:pointer;}
.hw-check label{flex:1;cursor:pointer;font-size:13px;}
.report-summary{font-size:13px;color:var(--pending);margin:6px 0;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">Homework Tracker</div>
    <h1>Class spreadsheets</h1>
    <div class="btn-row">
      <button class="btn-ghost" id="syncStatusBtn" onclick="showSyncPanel()">☁️ Sync: Off</button>
      <button class="btn-ghost" id="deleteClassBtn" style="display:none" onclick="deleteActiveClass()">🗑 Delete class</button>
      <button class="btn-ghost" onclick="exportData()">💾 Export</button>
      <button class="btn-ghost" onclick="importData()">📂 Import</button>
    </div>
    <div class="class-row" id="classRow"></div>
    <div class="add-class">
      <input type="text" id="newClassName" placeholder="New class name (e.g. P5 Science)">
      <button id="addClassBtn">Add class</button>
    </div>
  </header>
  <section id="content"></section>
  <footer>Data saved automatically · Synced via GitHub Gist when connected</footer>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY='homeworkTrackerData_v1';
const SYNC_CFG_KEY='hwTrackerSyncCfg_v1';
let state=loadState();
let activeClassId=state.classOrder[0]||null;

function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r);if(p&&p.classOrder)return p;}}catch(e){}
  return{classOrder:[], classes:{}, _updatedAt: Date.now()};
}
let saveTimer=null;
function saveState(){
  state._updatedAt = Date.now();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  if(syncToken&&syncGistId){clearTimeout(saveTimer);saveTimer=setTimeout(pushToCloud,800);}
}
function uid(p){return(p||'x')+'_'+Math.random().toString(36).slice(2,9);}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function escX(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[m]));}
function showModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

// ── SYNC ──────────────────────────────────────────────────────────────────────
let syncToken='',syncGistId='',pollHandle=null,applyingRemote=false,lastRemoteJson=null;
function loadSyncCfg(){try{const r=localStorage.getItem(SYNC_CFG_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveSyncCfg(c){localStorage.setItem(SYNC_CFG_KEY,JSON.stringify(c));}
function initSync(){const c=loadSyncCfg();if(c&&c.token&&c.gistId)connectSync(c.token,c.gistId,true);}
async function connectSync(token,gistId,silent){
  syncToken=token.trim();gistId=(gistId||'').trim();
  try{
    if(!gistId){
      const res=await fetch('https://api.github.com/gists',{method:'POST',
        headers:{'Authorization':'token '+syncToken,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
        body:JSON.stringify({description:'Homework Tracker data',public:false,
          files:{'homeworkTracker.json':{content:JSON.stringify({json:JSON.stringify(state),updatedAt:Date.now()})}}})});
      if(!res.ok){const e=await res.json();throw new Error(e.message||'Status '+res.status);}
      const d=await res.json();gistId=d.id;
      alert('Sync database created!\n\nGist ID: '+gistId+'\n\nWrite this down — enter it on your other device to link them.');
    }
    syncGistId=gistId;saveSyncCfg({token:syncToken,gistId:syncGistId});
    updateSyncBtn(true);
    if(pollHandle)clearInterval(pollHandle);
    await pollOnce();pollHandle=setInterval(pollOnce,5000);
    if(!silent)closeModal();
  }catch(err){
    console.warn(err);updateSyncBtn(false);
    if(!silent)alert('Could not connect.\n\n'+err.message+'\n\nCheck your token and Gist ID.');
  }
}
async function pollOnce(){
  if(!syncToken||!syncGistId)return;
  try{
    const res=await fetch('https://api.github.com/gists/'+syncGistId,
      {headers:{'Authorization':'token '+syncToken,'Accept':'application/vnd.github+json'}});
    if(!res.ok)return;
    const data=await res.json();
    const file=data.files&&data.files['homeworkTracker.json'];if(!file)return;
    const record=JSON.parse(file.content);
    const remoteJson=record&&record.json;if(!remoteJson)return;
    if(remoteJson===lastRemoteJson)return;
    const remoteState=JSON.parse(remoteJson);
    // Compare timestamps
    const localTime = state._updatedAt || 0;
    const remoteTime = remoteState._updatedAt || 0;
    if(remoteTime > localTime){
      lastRemoteJson=remoteJson;applyingRemote=true;
      state=remoteState;
      if(!state.classOrder.includes(activeClassId))activeClassId=state.classOrder[0]||null;
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      renderAll();applyingRemote=false;
    } else if(Object.keys(state.classes).length>0){
      lastRemoteJson=remoteJson;pushToCloud();
    }
  }catch(e){console.warn('Poll failed',e);}
}
async function pushToCloud(){
  if(!syncToken||!syncGistId||applyingRemote)return;
  const json=JSON.stringify(state);lastRemoteJson=json;
  try{
    await fetch('https://api.github.com/gists/'+syncGistId,{method:'PATCH',
      headers:{'Authorization':'token '+syncToken,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
      body:JSON.stringify({files:{'homeworkTracker.json':{content:JSON.stringify({json,updatedAt:Date.now()})}}})});
  }catch(e){console.warn('Push failed',e);}
}
function updateSyncBtn(on){const b=document.getElementById('syncStatusBtn');if(b)b.textContent=on?'☁️ Sync: On':'☁️ Sync: Off';}
function showSyncPanel(){
  const c=loadSyncCfg()||{};
  showModal(`<h3>☁️ Sync between devices</h3>
    <p>Create a GitHub Personal Access Token at:<br><b>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token (classic)</b><br>Tick only the <b>gist</b> scope.</p>
    <div style="margin-bottom:8px;"><input type="text" id="cfgToken" placeholder="GitHub token (ghp_...)" value="${esc(c.token||'')}" style="width:100%;font-size:12px;"></div>
    <div style="margin-bottom:8px;"><input type="text" id="cfgGistId" placeholder="Gist ID (leave blank on first device)" value="${esc(c.gistId||'')}" style="width:100%;"></div>
    <p style="font-size:11px;">Leave Gist ID blank on first device — app creates one and shows you the ID. Enter the same ID on other devices.</p>
    <div class="btn-row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-main" onclick="onConnectSync()">Connect</button></div>`);
}
function onConnectSync(){
  const t=document.getElementById('cfgToken').value.trim();
  const g=document.getElementById('cfgGistId').value.trim();
  if(!t){alert('Please enter your GitHub token.');return;}
  connectSync(t,g,false);
}

// ── BACKUP / RESTORE ──────────────────────────────────────────────────────────
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `homework_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      try{
        const data = JSON.parse(ev.target.result);
        if(data.classOrder && data.classes){
          if(confirm('This will replace ALL current data. Continue?')){
            state = data;
            state._updatedAt = Date.now();
            localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
            if(!state.classOrder.includes(activeClassId)) activeClassId = state.classOrder[0]||null;
            renderAll();
            alert('Data imported successfully.');
          }
        } else {
          alert('Invalid file format.');
        }
      }catch(err){ alert('Error reading file: '+err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── CLASS MANAGEMENT ──────────────────────────────────────────────────────────
function getClass(){return activeClassId?state.classes[activeClassId]:null;}
function getVisibleHomeworks(){const c=getClass();return c?c.homeworks.filter(h=>!h.hidden):[];}

function renderClassRow(){
  const row=document.getElementById('classRow');row.innerHTML='';
  state.classOrder.forEach(id=>{
    const c=state.classes[id];
    const chip=document.createElement('div');
    chip.className='class-chip'+(id===activeClassId?' active':'');
    chip.textContent=c.name;chip.onclick=()=>{activeClassId=id;renderAll();};
    row.appendChild(chip);
  });
  const d=document.getElementById('deleteClassBtn');if(d)d.style.display=activeClassId?'inline-block':'none';
}

function addClass(name){
  if(!name.trim())return;
  const id=uid('cls');
  state.classes[id]={id,name:name.trim(),students:[],homeworks:[],statuses:{}};
  state.classOrder.push(id);activeClassId=id;saveState();renderAll();
}
function deleteActiveClass(){if(activeClassId)deleteClass(activeClassId);}
function deleteClass(classId){
  const c=state.classes[classId];if(!c)return;
  if(!confirm(`⚠️ Delete "${c.name}"?\n\nPermanently removes:\n• ${c.students.length} student(s)\n• ${c.homeworks.length} homework(s)\n• All recorded statuses\n\nCannot be undone.`))return;
  if(!confirm(`Final check — permanently delete all data for "${c.name}"?`))return;
  state.classOrder=state.classOrder.filter(id=>id!==classId);
  delete state.classes[classId];activeClassId=state.classOrder[0]||null;saveState();renderAll();
}

// ── STUDENT MANAGEMENT ────────────────────────────────────────────────────────
function addStudent(name){
  const c=getClass();if(!c||!name.trim())return;
  c.students.push({id:uid('stu'),name:name.trim()});saveState();renderTable();renderReportSel();
}
function deleteStudent(stuId){
  const c=getClass();if(!c)return;
  if(!confirm('Remove this student?'))return;
  c.students=c.students.filter(s=>s.id!==stuId);delete c.statuses[stuId];saveState();renderTable();renderReportSel();
}

// ── HOMEWORK MANAGEMENT ───────────────────────────────────────────────────────
function addHomework(name,date){
  const c=getClass();if(!c||!name.trim())return;
  const id=uid('hw');c.homeworks.push({id,name:name.trim(),date:date||'',locked:false,hidden:false});
  saveState();renderTable();
}
function deleteHomework(hwId){
  const c=getClass();if(!c)return;
  const hw=c.homeworks.find(h=>h.id===hwId);
  if(hw&&hw.locked){alert('Column is locked. Tap 🔒 to unlock first.');return;}
  if(!confirm(`Delete "${hw?hw.name:''}" and all its statuses?`))return;
  c.homeworks=c.homeworks.filter(h=>h.id!==hwId);
  Object.keys(c.statuses).forEach(sid=>{if(c.statuses[sid])delete c.statuses[sid][hwId];});
  saveState();renderTable();
}
function toggleHwLock(hwId){
  const c=getClass();const hw=c&&c.homeworks.find(h=>h.id===hwId);if(!hw)return;
  hw.locked=!hw.locked;saveState();renderTable();
}
function hideHw(hwId){
  const c=getClass();const hw=c&&c.homeworks.find(h=>h.id===hwId);if(!hw)return;
  if(!confirm(`Hide "${hw.name}"? Data preserved — use Unhide to show again.`))return;
  hw.hidden=true;saveState();renderTable();
}
function showUnhidePanel(){
  const c=getClass();if(!c)return;
  let hidden=c.homeworks.filter(h=>!!h.hidden).sort((a,b)=>b.date.localeCompare(a.date));
  if(!hidden.length){alert('No hidden homework columns.');return;}
  let sel=new Set();
  let btns=hidden.map(h=>`<div id="uhsel_${h.id}" onclick="toggleUhSel('${h.id}')" style="padding:10px 14px;border-radius:10px;border:2px solid var(--line);background:white;cursor:pointer;margin-bottom:8px;">
    <div style="font-weight:700;">${esc(h.name)}</div>
    <div style="font-size:12px;color:var(--pending);">${h.date||'No date'}</div></div>`).join('');
  showModal(`<h3>Unhide homework columns</h3><p>Tap to select, then tap Unhide selected.</p>
    <div id="uhList">${btns}</div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-main" onclick="confirmUnhide()">Unhide selected</button>
    </div>`);
  window._uhSel=new Set();
}
function toggleUhSel(id){
  if(!window._uhSel)window._uhSel=new Set();
  const el=document.getElementById('uhsel_'+id);
  if(window._uhSel.has(id)){window._uhSel.delete(id);el.style.borderColor='var(--line)';el.style.background='white';}
  else{window._uhSel.add(id);el.style.borderColor='var(--accent)';el.style.background='var(--missing-bg)';}
}
function confirmUnhide(){
  if(!window._uhSel||!window._uhSel.size){alert('No columns selected.');return;}
  const c=getClass();if(!c)return;
  const names=[...window._uhSel].map(id=>{const h=c.homeworks.find(h=>h.id===id);return h?h.name:'';}).filter(Boolean);
  if(!confirm(`Unhide these columns?\n\n${names.join('\n')}`))return;
  window._uhSel.forEach(id=>{const h=c.homeworks.find(h=>h.id===id);if(h)h.hidden=false;});
  window._uhSel=new Set();saveState();closeModal();renderTable();
}

// ── STATUS MANAGEMENT ─────────────────────────────────────────────────────────
const STATUS_OPTIONS=[['','Not submitted'],['submitted','Submitted'],['perfect','Perfect'],['completed','Completed']];

function setStatus(stuId,hwId,status){
  const c=getClass();if(!c)return;
  if(!c.statuses[stuId])c.statuses[stuId]={};
  if(status==='')delete c.statuses[stuId][hwId];
  else c.statuses[stuId][hwId]=status;
  saveState();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){renderClassRow();renderContent();}

function renderContent(){
  const content=document.getElementById('content');
  const c=getClass();
  if(!c){content.innerHTML='<div class="empty-state">Add a class above to get started.</div>';return;}
  content.innerHTML=`
    <div class="panel">
      <h2>Students</h2>
      <div class="row-f">
        <input type="text" id="newStuName" placeholder="Student name" style="flex:1">
        <button class="btn-main" id="addStuBtn">Add</button>
      </div>
    </div>
    <div class="panel">
      <h2>Homework columns</h2>
      <div class="row-f">
        <input type="text" id="newHwName" placeholder="Homework name" style="flex:1">
        <input type="date" id="newHwDate">
        <button class="btn-main" id="addHwBtn">Add</button>
        <button class="btn-ghost" id="unhideBtn">👁 Unhide</button>
      </div>
    </div>
    <div class="panel">
      <h2>Spreadsheet</h2>
      <div class="table-scroll" id="tableWrap"></div>
    </div>
    <div class="panel">
      <h2>Reports & Export</h2>
      <div class="row-f">
        <button class="btn-main" onclick="showAllStudentsReport()">📄 All Students</button>
        <button class="btn-main" onclick="showSelectedStudentsReport()">📄 Selected Students</button>
      </div>
      <div class="row-f" style="margin-top:8px;">
        <button class="btn-ghost" id="excelBtn">📊 Export to Excel</button>
      </div>
    </div>`;
  document.getElementById('newHwDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('addStuBtn').onclick=()=>{const i=document.getElementById('newStuName');addStudent(i.value);i.value='';i.focus();};
  document.getElementById('newStuName').addEventListener('keydown',e=>{if(e.key==='Enter'){addStudent(e.target.value);e.target.value='';}});
  document.getElementById('addHwBtn').onclick=()=>{const n=document.getElementById('newHwName'),d=document.getElementById('newHwDate');addHomework(n.value,d.value);n.value='';};
  document.getElementById('unhideBtn').onclick=showUnhidePanel;
  document.getElementById('excelBtn').onclick=exportExcel;
  renderTable();renderReportSel();
}

function renderReportSel(){ /* kept for compatibility, not used */ }

function statusClass(st){return st?'st-'+st:'st-empty';}
function statusLabel(st){return{submitted:'Submitted',perfect:'Perfect',completed:'Completed'}[st]||'';}

function renderTable(){
  const wrap=document.getElementById('tableWrap');const c=getClass();
  if(!c){wrap.innerHTML='';return;}
  const visible=c.homeworks.filter(h=>!h.hidden);
  if(!visible.length){wrap.innerHTML='<div class="empty-state">Add homework columns above.</div>';return;}
  if(!c.students.length){wrap.innerHTML='<div class="empty-state">Add students above.</div>';return;}

  let h='<table><thead><tr><th style="text-align:left;min-width:110px;">Student</th>';
  visible.forEach(hw=>{
    const lk=!!hw.locked;
    h+=`<th class="hw-hd">${esc(hw.name)}<br><span style="font-size:10px;font-weight:400;color:var(--pending);">${hw.date||''}</span>
      <br><span style="display:inline-flex;gap:2px;margin-top:2px;">
        <button class="btn-ghost" style="font-size:10px;padding:2px 5px;" onclick="toggleHwLock('${hw.id}')">${lk?'🔒':'🔓'}</button>
        <button class="btn-ghost" style="font-size:10px;padding:2px 5px;" onclick="hideHw('${hw.id}')">👁 Hide</button>
        <button class="btn-ghost" style="font-size:10px;padding:2px 5px;" onclick="showOverview('${hw.id}')">👀</button>
        ${lk?'':`<button class="btn-ghost" style="font-size:10px;padding:2px 5px;" onclick="deleteHomework('${hw.id}')">✕</button>`}
      </span></th>`;
  });
  h+='</tr></thead><tbody>';
  c.students.forEach(s=>{
    h+=`<tr><td>${esc(s.name)} <button class="del-btn" onclick="deleteStudent('${s.id}')">✕</button></td>`;
    visible.forEach(hw=>{
      const st=(c.statuses[s.id]&&c.statuses[s.id][hw.id])||'';
      h+=`<td class="${statusClass(st)}"><select onchange="setStatus('${s.id}','${hw.id}',this.value);renderTable();">`;
      STATUS_OPTIONS.forEach(([v,l])=>{h+=`<option value="${v}"${v===st?' selected':''}>${l}</option>`;});
      h+=`</select></td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  wrap.innerHTML=h;
}

// ── OVERVIEW POPUP ────────────────────────────────────────────────────────────
let ovHwId=null,massMode=null;
function showOverview(hwId){ovHwId=hwId;massMode=null;renderOverview();}
function renderOverview(){
  const c=getClass();const hw=c&&c.homeworks.find(h=>h.id===ovHwId);if(!hw)return;
  const massBtn=(st,lbl)=>{const on=massMode===st;return`<button class="${on?'btn-active':'btn-ghost'}" onclick="toggleMass('${st}')">${on?'✓ ':''} ${lbl}</button>`;};
  let html=`<h3>${esc(hw.name)}</h3><p>${hw.date||''} — tap a student to update status.</p>
    <p style="font-size:12px;color:var(--pending);margin-bottom:6px;">Mass update: pick a status then tap students.</p>
    <div class="btn-row">${massBtn('submitted','Submitted')}${massBtn('perfect','Perfect')}${massBtn('completed','Completed')}</div>
    <div class="pill-grid">`;
  c.students.forEach(s=>{
    const st=(c.statuses[s.id]&&c.statuses[s.id][ovHwId])||'';
    html+=`<div class="pill pill-${st||'empty'}" id="pill_${s.id}" onclick="onPillClick('${s.id}')">${esc(s.name)}</div>`;
  });
  html+=`</div><div class="btn-row" style="margin-top:10px;"><button class="btn-main" onclick="closeModal()">Close</button></div>`;
  showModal(html);
}
function toggleMass(st){massMode=(massMode===st)?null:st;renderOverview();}
function onPillClick(stuId){
  if(massMode){setStatus(stuId,ovHwId,massMode);renderOverview();renderTable();return;}
  document.querySelectorAll('.pill-dropdown').forEach(el=>el.remove());
  const pill=document.getElementById('pill_'+stuId);
  const dd=document.createElement('div');dd.className='pill-dropdown';
  STATUS_OPTIONS.forEach(([v,l])=>{
    const btn=document.createElement('button');btn.textContent=l;
    btn.onclick=(e)=>{e.stopPropagation();setStatus(stuId,ovHwId,v);renderOverview();renderTable();};
    dd.appendChild(btn);
  });
  pill.appendChild(dd);
}

// ── EXCEL EXPORT ──────────────────────────────────────────────────────────────
function exportExcel(){
  const c=getClass();if(!c)return;
  const visible=c.homeworks.filter(h=>!h.hidden);
  const header=['Student',...visible.map(h=>`${h.name} (${h.date||''})`)];
  const rows=c.students.map(s=>{
    const row=[s.name];
    visible.forEach(hw=>{const st=(c.statuses[s.id]&&c.statuses[s.id][hw.id])||'';row.push(st?st.charAt(0).toUpperCase()+st.slice(1):'');});
    return row;
  });
  const ws=XLSX.utils.aoa_to_sheet([header,...rows]);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,c.name.slice(0,31));
  XLSX.writeFile(wb,`${c.name.replace(/[^a-z0-9]/gi,'_')}_homework.xlsx`);
}

// ── REPORT SELECTION & GENERATION ────────────────────────────────────────────
// Global report state
let reportState = {
  mode: 'all',        // 'all' or 'selected'
  students: new Set(),
  homeworks: new Set()
};

function showAllStudentsReport(){
  const c = getClass();
  if(!c){ alert('No class loaded.'); return; }
  const visible = c.homeworks.filter(h=>!h.hidden);
  if(!visible.length){ alert('No visible homework columns to report.'); return; }
  // Pre-select all students
  reportState.mode = 'all';
  reportState.students = new Set(c.students.map(s=>s.id));
  // Pre-select all visible homework
  reportState.homeworks = new Set(visible.map(h=>h.id));
  openHomeworkSelectionModal('all');
}

function showSelectedStudentsReport(){
  const c = getClass();
  if(!c){ alert('No class loaded.'); return; }
  if(!c.students.length){ alert('No students in this class.'); return; }
  const visible = c.homeworks.filter(h=>!h.hidden);
  if(!visible.length){ alert('No visible homework columns to report.'); return; }
  reportState.mode = 'selected';
  reportState.students = new Set(); // start empty
  reportState.homeworks = new Set(visible.map(h=>h.id)); // default all visible
  openStudentSelectionModal();
}

// Student selection modal
function openStudentSelectionModal(){
  const c = getClass(); if(!c) return;
  const allSelected = c.students.every(s => reportState.students.has(s.id));
  const hwNames = c.homeworks.filter(h=>reportState.homeworks.has(h.id)).map(h=>h.name).join(', ') || 'None selected';
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
    <h3 style="margin:0;">📄 Select Students</h3>
    <button class="btn-ghost" style="font-size:12px;padding:5px 12px;" onclick="toggleAllStudents()">${allSelected ? 'Deselect All' : 'All'}</button>
  </div>
  <div style="margin:6px 0;font-size:13px;color:var(--pending);">Selected homework: ${esc(hwNames)}</div>
  <div style="margin:6px 0;">
    <button class="btn-ghost" style="font-size:12px;" onclick="openHomeworkSelectionModal('selected')">📋 Select Homework</button>
  </div>
  <div style="max-height:280px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:8px;">`;
  c.students.forEach(s => {
    const sel = reportState.students.has(s.id) ? 'sel' : '';
    html += `<span class="stu-pill ${sel}" onclick="toggleStudent('${s.id}')">${esc(s.name)}</span>`;
  });
  html += `</div>
    <div style="margin-top:12px;">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-main" onclick="generateReportFromState()" ${reportState.students.size===0?'disabled':''}>Generate Report</button>
    </div>`;
  showModal(html);
}

function toggleStudent(stuId){
  if(reportState.students.has(stuId)) reportState.students.delete(stuId);
  else reportState.students.add(stuId);
  openStudentSelectionModal();
}
function toggleAllStudents(){
  const c = getClass(); if(!c) return;
  const allSelected = c.students.every(s=>reportState.students.has(s.id));
  if(allSelected) reportState.students.clear();
  else c.students.forEach(s=>reportState.students.add(s.id));
  openStudentSelectionModal();
}

// Homework selection modal
function openHomeworkSelectionModal(mode){
  const c = getClass(); if(!c) return;
  const visible = c.homeworks.filter(h=>!h.hidden);
  const allSelected = visible.every(h=>reportState.homeworks.has(h.id));
  let html = `<h3>📋 Select Homework</h3>
    <div style="margin:8px 0;">
      <label style="font-weight:600;cursor:pointer;"><input type="checkbox" id="selectAllHw" ${allSelected?'checked':''} onchange="toggleAllHw()"> Select All</label>
    </div>
    <div style="max-height:250px;overflow-y:auto;border:1px solid var(--line);border-radius:8px;padding:4px;">`;
  visible.forEach(h => {
    const checked = reportState.homeworks.has(h.id) ? 'checked' : '';
    html += `<div class="hw-check">
      <input type="checkbox" id="hwchk_${h.id}" value="${h.id}" ${checked}>
      <label for="hwchk_${h.id}">${esc(h.name)} ${h.date ? ' ('+esc(h.date)+')' : ''}</label>
    </div>`;
  });
  html += `</div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn-ghost" onclick="closeModal(); ${mode==='selected' ? 'openStudentSelectionModal();' : ''}">Cancel</button>
      <button class="btn-main" onclick="applyHomeworkSelection('${mode}')">Apply</button>
    </div>`;
  showModal(html);
}

function toggleAllHw(){
  const checked = document.getElementById('selectAllHw').checked;
  document.querySelectorAll('#modalBody input[type=checkbox][id^="hwchk_"]').forEach(cb => cb.checked = checked);
}

function applyHomeworkSelection(mode){
  const checked = document.querySelectorAll('#modalBody input[type=checkbox][id^="hwchk_"]:checked');
  reportState.homeworks = new Set(Array.from(checked).map(cb => cb.value));
  closeModal();
  if(mode === 'all'){
    // All students are already selected, generate directly
    generateReportFromState();
  } else {
    // Return to student selection
    openStudentSelectionModal();
  }
}

function generateReportFromState(){
  if(reportState.students.size === 0){ alert('Please select at least one student.'); return; }
  if(reportState.homeworks.size === 0){ alert('Please select at least one homework column.'); return; }
  const studentIds = Array.from(reportState.students);
  const homeworkIds = Array.from(reportState.homeworks);
  closeModal();
  generateWordReport(studentIds, homeworkIds);
}

// ── WORD REPORT ───────────────────────────────────────────────────────────────
const RED='C00000';

function colorRun(text,color,bold){
  const rpr=`<w:rPr>${bold?'<w:b/>':''}${color?`<w:color w:val="${color}"/>`:''}<w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr>`;
  return`<w:r>${rpr}<w:t xml:space="preserve">${escX(text)}</w:t></w:r>`;
}
function mixedCell(runs,colW,bold,align){
  const wXml=colW?`<w:tcW w:w="${colW}" w:type="dxa"/>`:'';
  const alignProp = align ? `<w:jc w:val="${align}"/>` : '';
  const pPr = `<w:pPr><w:spacing w:before="0" w:after="60"/>${alignProp}<w:rPr>${bold?'<w:b/>':''}</w:rPr></w:pPr>`;
  // add left margin of 100 twips (approx one character) to all cells
  const margin = `<w:tcMar><w:left w:w="100" w:type="dxa"/><w:right w:w="100" w:type="dxa"/></w:tcMar>`;
  return`<w:tc><w:tcPr>${wXml}${margin}<w:tcBorders>
    <w:top w:val="single" w:sz="4" w:color="000000"/>
    <w:left w:val="single" w:sz="4" w:color="000000"/>
    <w:bottom w:val="single" w:sz="4" w:color="000000"/>
    <w:right w:val="single" w:sz="4" w:color="000000"/>
  </w:tcBorders></w:tcPr><w:p>${pPr}${runs}</w:p></w:tc>`;
}

function statusRuns(st){
  // Updated colours per user request
  if(st==='submitted') return colorRun('Submitted (corrections not cleared)', RED, false);
  if(st==='perfect')   return colorRun('Perfect', null, false); // black
  if(st==='completed') return colorRun('Completed (corrections cleared)', null, false); // black
  return colorRun('Not submitted', RED, false);
}

async function generateWordReport(stuIds, selectedHwIds){
  const c=getClass();if(!c){alert('No class selected.');return;}
  const hwList=c.homeworks.filter(h=>selectedHwIds.includes(h.id));
  if(!hwList.length){alert('No homework selected.');return;}
  const paragraphs=[];
  for(let si=0;si<stuIds.length;si++){
    const stuId=stuIds[si];const s=c.students.find(st=>st.id===stuId);if(!s)continue;
    if(si>0)paragraphs.push(pageBreak());
    // Title
    paragraphs.push(`<w:p><w:pPr><w:spacing w:before="0" w:after="120"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="32"/></w:rPr><w:t>Homework Status Report</w:t></w:r></w:p>`);
    paragraphs.push(`<w:p><w:pPr><w:spacing w:before="0" w:after="80"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="22"/></w:rPr><w:t xml:space="preserve">Student: ${escX(s.name)}</w:t></w:r></w:p>`);
    paragraphs.push(`<w:p><w:pPr><w:spacing w:before="0" w:after="80"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve">Class: ${escX(c.name)}</w:t></w:r></w:p>`);
    // Date reported – all black
    paragraphs.push(`<w:p><w:pPr><w:spacing w:before="0" w:after="160"/></w:pPr>
      <w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve">Date reported: </w:t></w:r>
      <w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t>${escX(new Date().toLocaleDateString())}</w:t></w:r></w:p>`);
    // "Homework assigned" – black
    paragraphs.push(`<w:p><w:pPr><w:spacing w:before="0" w:after="120"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="24"/></w:rPr><w:t>Homework assigned</w:t></w:r></w:p>`);
    // Table
    const totalW=7000;const cw=[3800,1200,2000];
    const tblGrid=`<w:tblGrid>${cw.map(w=>`<w:gridCol w:w="${w}"/>`).join('')}</w:tblGrid>`;
    // Headers – centrally aligned
    const headerRow=`<w:tr>${mixedCell(colorRun('Homework',null,true),cw[0],true,'center')}${mixedCell(colorRun('Date',null,true),cw[1],true,'center')}${mixedCell(colorRun('Status',null,true),cw[2],true,'center')}</w:tr>`;
    const dataRows=hwList.map(hw=>{
      const st=(c.statuses[stuId]&&c.statuses[stuId][hw.id])||'';
      return`<w:tr>${mixedCell(colorRun(hw.name,null,false),cw[0],false,'left')}${mixedCell(colorRun(hw.date||'',null,false),cw[1],false,'center')}${mixedCell(statusRuns(st),cw[2],false,'left')}</w:tr>`;
    }).join('');
    paragraphs.push(`<w:tbl><w:tblPr><w:tblW w:w="${totalW}" w:type="dxa"/><w:tblLayout w:type="fixed"/></w:tblPr>${tblGrid}${headerRow}${dataRows}</w:tbl>`);
    // Signature block
    paragraphs.push(dp(''));
    paragraphs.push(`<w:tbl><w:tblPr><w:tblW w:w="9638" w:type="dxa"/><w:tblLayout w:type="fixed"/>
      <w:tblBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders></w:tblPr>
      <w:tblGrid><w:gridCol w:w="1400"/><w:gridCol w:w="8238"/></w:tblGrid>
      <w:tr><w:trPr><w:cantSplit/></w:trPr>
        <w:tc><w:tcPr><w:tcW w:w="9638" w:type="dxa"/><w:gridSpan w:val="2"/>
          <w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="none"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
          <w:p><w:r><w:rPr><w:b/><w:sz w:val="20"/></w:rPr><w:t>Parent / Guardian Acknowledgement</w:t></w:r></w:p></w:tc></w:tr>
      <w:tr><w:trPr><w:cantSplit/></w:trPr>
        <w:tc><w:tcPr><w:tcW w:w="1400" w:type="dxa"/>
          <w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="single" w:sz="8" w:color="000000"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
          <w:p><w:pPr><w:spacing w:before="400" w:after="0"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t>Signature:</w:t></w:r></w:p></w:tc>
        <w:tc><w:tcPr><w:tcW w:w="8238" w:type="dxa"/>
          <w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="single" w:sz="8" w:color="000000"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
          <w:p><w:pPr><w:spacing w:before="400" w:after="0"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve"> </w:t></w:r></w:p></w:tc></w:tr>
      <w:tr><w:trPr><w:cantSplit/></w:trPr>
        <w:tc><w:tcPr><w:tcW w:w="1400" w:type="dxa"/>
          <w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="single" w:sz="8" w:color="000000"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
          <w:p><w:pPr><w:spacing w:before="400" w:after="0"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t>Date:</w:t></w:r></w:p></w:tc>
        <w:tc><w:tcPr><w:tcW w:w="8238" w:type="dxa"/>
          <w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:bottom w:val="single" w:sz="8" w:color="000000"/><w:right w:val="none"/></w:tcBorders></w:tcPr>
          <w:p><w:pPr><w:spacing w:before="400" w:after="0"/></w:pPr><w:r><w:rPr><w:sz w:val="20"/></w:rPr><w:t xml:space="preserve"> </w:t></w:r></w:p></w:tc></w:tr>
    </w:tbl>`);
  }
  const ctXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;
  const relsXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;
  const docXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${paragraphs.join('\n')}<w:sectPr><w:pgMar w:top="720" w:right="1440" w:bottom="720" w:left="1440"/></w:sectPr></w:body>
</w:document>`;
  const zip=new JSZip();
  zip.file('[Content_Types].xml',ctXml);
  zip.folder('_rels').file('.rels',relsXml);
  zip.folder('word').file('document.xml',docXml);
  const blob=await zip.generateAsync({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  const fname=stuIds.length===1?(c.students.find(s=>s.id===stuIds[0])?.name||'student').replace(/[^a-z0-9]/gi,'_'):c.name.replace(/[^a-z0-9]/gi,'_')+'_all';
  a.download=`${fname}_homework_report.docx`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function dp(text,opts){
  opts=opts||{};const rp=[];
  if(opts.bold)rp.push('<w:b/>');
  if(opts.size)rp.push(`<w:sz w:val="${opts.size}"/><w:szCs w:val="${opts.size}"/>`);
  const rPr=rp.length?`<w:rPr>${rp.join('')}</w:rPr>`:'';
  const pPr=(opts.bold||opts.size)?`<w:pPr><w:rPr>${rp.join('')}</w:rPr></w:pPr>`:'';
  return`<w:p>${pPr}<w:r>${rPr}<w:t xml:space="preserve">${escX(text)}</w:t></w:r></w:p>`;
}
function pageBreak(){return`<w:p><w:r><w:br w:type="page"/></w:r></w:p>`;}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('addClassBtn').onclick=()=>{const i=document.getElementById('newClassName');addClass(i.value);i.value='';};
document.getElementById('newClassName').addEventListener('keydown',e=>{if(e.key==='Enter'){addClass(e.target.value);e.target.value='';}});
renderAll();
initSync();
</script>
